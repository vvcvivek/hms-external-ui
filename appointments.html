<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMS — Appointments</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand"><i class="ti ti-building-hospital"></i> City <span>HMS</span></a>
  <div class="nav-links">
    <a href="index.html"        class="nav-link">Dashboard</a>
    <a href="patients.html"     class="nav-link">Patients</a>
    <a href="appointments.html" class="nav-link active">Appointments</a>
    <a href="doctors.html"      class="nav-link">Doctors</a>
    <a href="booking.html"      class="nav-link">Book appointment</a>
  </div>
  <div class="nav-user" onclick="Auth.logout()">
    <div class="nav-avatar">AD</div>
    <span>Admin</span>
    <i class="ti ti-logout" style="font-size:14px;opacity:0.6"></i>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>Appointments</h1>
    <p>All appointments across the hospital</p>
  </div>

  <div class="search-bar">
    <input id="search" placeholder="Search by patient, doctor, or ID..." oninput="filter()" />
    <select id="statusFilter" onchange="filter()">
      <option value="">All status</option>
      <option value="Scheduled">Scheduled</option>
      <option value="Confirmed">Confirmed</option>
      <option value="In Progress">In Progress</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <a href="booking.html" class="btn btn-primary">
      <i class="ti ti-plus"></i> New
    </a>
  </div>

  <div class="card">
    <div class="card-body" style="padding:0">
      <div id="appt-table"><div class="loading">Loading appointments...</div></div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script>
guardAuth();

let allAppts = [];

API.getAppointments().then(rows => {
  allAppts = rows;
  renderTable(rows);
}).catch(() => toast('Could not load appointments', 'error'));

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  const s = document.getElementById('statusFilter').value;
  renderTable(allAppts.filter(a => {
    const txt = `${a.Name} ${a.Patient__r?.First_Name__c} ${a.Patient__r?.Last_Name__c} ${a.Doctor__r?.Name}`.toLowerCase();
    return txt.includes(q) && (!s || a.Status__c === s);
  }));
}

function renderTable(rows) {
  const el = document.getElementById('appt-table');
  if (!rows.length) { el.innerHTML = '<div class="empty">No appointments found.</div>'; return; }
  el.innerHTML = `<table class="tbl" style="padding:0">
    <thead style="padding:0 18px">
      <tr style="padding:0 18px">
        <th style="padding:12px 18px">APT ID</th>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Date</th>
        <th>Time</th>
        <th>Type</th>
        <th>Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(r => `<tr>
        <td style="padding-left:18px;color:#64748b;font-size:12px">${r.Name}</td>
        <td>${r.Patient__r?.First_Name__c||''} ${r.Patient__r?.Last_Name__c||''}</td>
        <td>${r.Doctor__r?.Name||'—'}</td>
        <td>${formatDate(r.Appointment_Date__c)}</td>
        <td>${r.Appointment_Time__c ? r.Appointment_Time__c.slice(0,5) : '—'}</td>
        <td><span class="badge b-gray">${r.Type__c||'—'}</span></td>
        <td>${statusBadge(r.Status__c)}</td>
        <td style="padding-right:18px"><button class="btn btn-outline btn-sm">View</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}
</script>
</body>
</html>
