<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMS — Doctors</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-brand"><i class="ti ti-building-hospital"></i> City <span>HMS</span></a>
  <div class="nav-links">
    <a href="index.html"        class="nav-link">Dashboard</a>
    <a href="patients.html"     class="nav-link">Patients</a>
    <a href="appointments.html" class="nav-link">Appointments</a>
    <a href="doctors.html"      class="nav-link active">Doctors</a>
    <a href="booking.html"      class="nav-link">Book appointment</a>
  </div>
  <div class="nav-user" onclick="Auth.logout()">
    <div class="nav-avatar">AD</div>
    <span>Admin</span>
    <i class="ti ti-logout" style="font-size:14px;opacity:0.6"></i>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1>Doctors</h1>
    <p>Active medical staff and performance</p>
  </div>

  <div class="search-bar">
    <input id="search" placeholder="Search by name or specialization..." oninput="filter()" />
    <select id="specFilter" onchange="filter()">
      <option value="">All specializations</option>
      <option>Cardiology</option>
      <option>Neurology</option>
      <option>Orthopedics</option>
      <option>Pediatrics</option>
      <option>Dermatology</option>
      <option>General Medicine</option>
    </select>
  </div>

  <div id="doctor-grid" class="grid-3"><div class="loading" style="grid-column:1/-1">Loading doctors...</div></div>
</div>

<script src="api.js"></script>
<script>
guardAuth();

let allDoctors = [];
let apptCounts = {};

Promise.all([API.getDoctors(), API.getDoctorAppointmentCounts()])
  .then(([docs, counts]) => {
    allDoctors = docs;
    counts.forEach(c => { apptCounts[c.Doctor__c] = c.total; });
    renderDoctors(docs);
  })
  .catch(() => toast('Could not load doctors', 'error'));

function filter() {
  const q    = document.getElementById('search').value.toLowerCase();
  const spec = document.getElementById('specFilter').value;
  renderDoctors(allDoctors.filter(d => {
    const txt = `${d.Name} ${d.Specialization__c||''}`.toLowerCase();
    return txt.includes(q) && (!spec || d.Specialization__c === spec);
  }));
}

function renderDoctors(rows) {
  const grid = document.getElementById('doctor-grid');
  if (!rows.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No doctors found.</div>';
    return;
  }
  const maxAppts = Math.max(...rows.map(d => apptCounts[d.Id] || 0), 1);

  grid.innerHTML = rows.map(d => {
    const parts = d.Name.replace('Dr. ', '').split(' ');
    const ini   = (parts[0]?.[0]||'') + (parts[1]?.[0]||'');
    const count = apptCounts[d.Id] || 0;
    const pct   = Math.round((count / maxAppts) * 100);
    const avail = d.Is_Available__c;
    return `<div class="doctor-card">
      <div class="d-header">
        <div class="d-avatar">${ini.toUpperCase()}</div>
        <div>
          <div class="d-name">${d.Name}</div>
          <div class="d-spec">${d.Specialization__c||d.Department__c||'—'}</div>
        </div>
        <div style="margin-left:auto">${avail
          ? '<span class="badge b-green">Available</span>'
          : '<span class="badge b-orange">Busy</span>'
        }</div>
      </div>
      <div class="d-stat">${count} appointments this month</div>
      <div class="d-stat" style="margin-bottom:4px">
        <i class="ti ti-clock" style="font-size:11px"></i> ${d.Years_of_Experience__c||'—'} yrs exp
        &nbsp;·&nbsp;
        <i class="ti ti-currency-rupee" style="font-size:11px"></i> ${d.Consultation_Fee__c ? '₹'+d.Consultation_Fee__c : '—'}
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
