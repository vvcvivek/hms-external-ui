<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMS — Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-wrap {
  width: 100%;
  max-width: 400px;
  padding: 24px;
}
.login-card {
  background: #fff;
  border: 0.5px solid #e2e8f0;
  border-radius: 14px;
  padding: 36px 32px;
  text-align: center;
}
.logo {
  width: 52px; height: 52px;
  background: #0A2463;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  color: #5DD9B0; font-size: 26px;
}
h1 { font-size: 20px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
.sub { font-size: 13px; color: #64748b; margin-bottom: 28px; }
.btn-sf {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px;
  background: #0A2463;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-sf:hover { background: #1a3a7a; }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0;
  color: #94a3b8; font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 0.5px; background: #e2e8f0;
}
.note { font-size: 11px; color: #94a3b8; margin-top: 16px; line-height: 1.6; }
.config-hint {
  background: #f8fafc;
  border: 0.5px solid #e2e8f0;
  border-radius: 8px;
  padding: 12px;
  text-align: left;
  margin-top: 20px;
}
.config-hint p { font-size: 11px; color: #64748b; line-height: 1.6; }
.config-hint code {
  background: #e2e8f0;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-family: monospace;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo"><i class="ti ti-building-hospital"></i></div>
    <h1>City HMS</h1>
    <p class="sub">Hospital Management System</p>
    <button class="btn-sf" onclick="Auth.login()">
      <i class="ti ti-cloud" style="font-size:18px"></i>
      Login with Salesforce
    </button>
    <div class="divider">or</div>
    <div class="config-hint">
      <p>
        Before logging in, update <code>SF_CONFIG</code> in <code>api.js</code>
        with your Connected App <code>clientId</code> and <code>redirectUri</code>.
        Also add <code>http://localhost:8080</code> to CORS in Salesforce Setup.
      </p>
    </div>
    <p class="note">Your credentials are never stored. Sessions use Salesforce OAuth 2.0 tokens.</p>
  </div>
</div>
<script src="api.js"></script>
</body>
</html>
